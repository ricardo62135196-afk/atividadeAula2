name: DEPLOY DE SITE COM GITHUB ACTIONS 

on:
  push:
    branches:["main"]

permissions: 
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
      runs-on: ubuntu-latest

      steps:
        #Atualizado para @v4 (garante compatibilidade com o ambiente atual)
        - name: Checkout do código
          uses: actions/checkout@v4

        #Atualizado para @v5
        - name: configurar o GitHub Pages
          uses: actions/configure-pages@v5

        

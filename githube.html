<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="gitehub.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Conhecimentos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .pergunta {
            margin-bottom: 20px;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        #resultado {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teste de Conhecimentos</h1>

    <form id="quiz">

        <div class="pergunta">
            <p>1. Qual é a capital do Brasil?</p>
            <label><input type="radio" name="q1" value="a"> São Paulo</label><br>
            <label><input type="radio" name="q1" value="b"> Brasília</label><br>
            <label><input type="radio" name="q1" value="c"> Rio de Janeiro</label>
        </div>

        <div class="pergunta">
            <p>2. Quanto é 8 × 7?</p>
            <label><input type="radio" name="q2" value="a"> 54</label><br>
            <label><input type="radio" name="q2" value="b"> 56</label><br>
            <label><input type="radio" name="q2" value="c"> 64</label>
        </div>

        <div class="pergunta">
            <p>3. HTML significa:</p>
            <label><input type="radio" name="q3" value="a"> HyperText Markup Language</label><br>
            <label><input type="radio" name="q3" value="b"> HighText Machine Language</label><br>
            <label><input type="radio" name="q3" value="c"> Home Tool Markup Language</label>
        </div>

        <div class="pergunta">
            <p>4. Qual linguagem é usada para estilizar páginas web?</p>
            <label><input type="radio" name="q4" value="a"> CSS</label><br>
            <label><input type="radio" name="q4" value="b"> Python</label><br>
            <label><input type="radio" name="q4" value="c"> Java</label>
        </div>

        <div class="pergunta">
            <p>5. JavaScript é usado principalmente para:</p>
            <label><input type="radio" name="q5" value="a"> Banco de dados</label><br>
            <label><input type="radio" name="q5" value="b"> Tornar páginas interativas</label><br>
            <label><input type="radio" name="q5" value="c"> Criar sistemas operacionais</label>
        </div>

        <button type="button" onclick="corrigir()">Corrigir</button>

    </form>

    <div id="resultado"></div>
</div>

<script>
function corrigir() {
    let respostas = {
        q1: "b",
        q2: "b",
        q3: "a",
        q4: "a",
        q5: "b"
    };

    let pontos = 0;

    for (let pergunta in respostas) {
        let resposta = document.querySelector(`input[name="${pergunta}"]:checked`);
        if (resposta && resposta.value === respostas[pergunta]) {
            pontos++;
        }
    }

    document.getElementById("resultado").innerHTML =
        `Você acertou ${pontos} de 5 questões.`;
}
</script>

</body>
</html>
